# Fly.io config for Curve composite worker
# Deploy: cd services/composite-worker && fly launch --no-deploy (first time)
#         then: fly secrets set WORKER_AUTH_TOKEN=<random> && fly deploy
app = "curve-composite-worker"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[checks.health]
  type = "http"
  port = 8080
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
